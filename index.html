<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Mission Zeltlager">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ef7db8">
  <title>Mission Zeltlager</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app"></main>
  <div id="sparkles" aria-hidden="true"></div>
  <div id="confetti" aria-hidden="true"></div>
  <div id="toast" class="toast hidden" role="status"></div>
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-badge">✨ Mission geschafft</div>
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <img id="modalImage" class="modal-image hidden" alt="Hinweisbild">
      <button id="modalButton" class="primary">Verstanden</button>
    </div>
  </div>
  <div id="mapModal" class="modal hidden">
    <div class="map-card">
      <button id="closeMap" class="close">Schließen</button>
      <div class="map-title">🧭 Landkarte</div>
      <img src="assets/map.png" alt="Landkarte">
    </div>
  </div>
  <script src="missions.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));
    }
  </script>
</body>
</html>
